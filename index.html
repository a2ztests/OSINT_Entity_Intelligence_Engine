<script>
function run() {
    const names = document.getElementById("names").value;
    const container = document.getElementById("results");

    container.innerHTML = "";

    const evt = new EventSource("YOUR_NGROK_URL/stream_people?names=" + names);

    evt.onmessage = function(event) {
        const data = JSON.parse(event.data);

        const div = document.createElement("div");

        div.innerHTML = `
            <h2>${data.name}</h2>

            <p><b>Same Person:</b> ${data.entity_resolution.is_same_person}</p>
            <p><b>Confidence:</b> ${data.entity_resolution.confidence}</p>

            <p><b>Explanation:</b> ${data.analysis.explanation}</p>

            <details>
                <summary>Profiles</summary>
                <pre>${JSON.stringify(data.profiles, null, 2)}</pre>
            </details>

            <hr/>
        `;

        container.appendChild(div);
    };
}
</script>

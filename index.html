<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OSINT Intelligence Engine</title>

    <style>
        body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
        input { padding:10px; width:300px; }
        button { padding:10px; margin:5px; }
        .card { background:#1e293b; padding:10px; margin-top:10px; border-radius:10px; }
        pre { background:black; padding:10px; overflow:auto; }
    </style>
</head>

<body>

<h2>🧠 OSINT Engine (Stable Version)</h2>

<button onclick="setUrl()">Set Backend URL</button>
<br><br>

<input id="names" placeholder="Enter names">
<button onclick="run()">Run</button>

<div id="out"></div>

<script>

function setUrl(){
    const url = prompt("Backend URL");
    if(url) localStorage.setItem("api", url);
}

function run(){

    const base = localStorage.getItem("api");
    if(!base){ alert("Set backend URL"); return; }

    const names = document.getElementById("names").value;

    const evt = new EventSource(base + "/stream_people?names=" + encodeURIComponent(names));

    evt.onmessage = function(e){

        const d = JSON.parse(e.data);

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML =
            "<h3>" + (d.name || d.status || "update") + "</h3>" +
            "<pre>" + JSON.stringify(d, null, 2) + "</pre>";

        document.getElementById("out").appendChild(div);
    };
}

</script>

</body>
</html>

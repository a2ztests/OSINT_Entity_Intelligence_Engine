<body>

<h1>🧠 OSINT Entity Intelligence Engine</h1>

<button onclick="setApi()">Set Backend URL</button>

<br><br>

<input id="names" placeholder="Enter names (comma separated)">
<button onclick="run()">Run Intelligence</button>

<div id="results"></div>

<script>

function setApi() {
    const url = prompt("Paste your Cloudflare backend URL:");
    localStorage.setItem("api_url", url);
}

function run() {
    const BASE_URL = localStorage.getItem("api_url");

    if (!BASE_URL) {
        alert("Please set backend URL first");
        return;
    }

    const names = document.getElementById("names").value;
    const container = document.getElementById("results");

    container.innerHTML = "";

    const evt = new EventSource(
        BASE_URL + "/stream_people?names=" + encodeURIComponent(names)
    );

    evt.onmessage = function(event) {
        const data = JSON.parse(event.data);

        const div = document.createElement("div");
        div.className = "card";

        const summary = data.analysis?.summary || "No summary";
        const findings = data.analysis?.key_findings || [];
        const risks = data.analysis?.risk_flags || [];

        div.innerHTML = `
            <h2>${data.name}</h2>

            <p><b>Same Person:</b> ${data.entity_resolution.is_same_person}</p>
            <p><b>Confidence:</b> ${data.entity_resolution.confidence}%</p>

            <p><b>Summary:</b> ${summary}</p>

            <p><b>Key Findings:</b> ${findings.length ? findings.join(", ") : "None"}</p>

            <p><b>Risk Flags:</b> ${risks.length ? risks.join(", ") : "None"}</p>

            <details>
                <summary>Profiles</summary>
                <pre>${JSON.stringify(data.profiles, null, 2)}</pre>

```
        </details>

        <details>
            <summary>Full JSON</summary>
            <pre>${JSON.stringify(data, null, 2)}</pre>
        </details>

        <hr/>
    `;

    container.appendChild(div);
};

evt.onerror = function(err) {
    console.error("SSE error:", err);
};
```

}

</script>

</body>
